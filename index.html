<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Radora — Something's Cooking</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black:      #050608;
      --blue-core:  #1a6fff;
      --blue-bright:#3d8fff;
      --blue-glow:  #5aa8ff;
      --blue-dim:   #0d3a80;
      --white:      #f0f4ff;
      --white-dim:  #8a9bbf;
      --grid:       rgba(26,111,255,0.06);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-bbsizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUNDS ── */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 20%, transparent 100%);
    }
    .glow-center {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 55% 55% at 50% 55%,
        rgba(26,111,255,0.2) 0%, rgba(26,111,255,0.06) 50%, transparent 75%);
    }
    .noise {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ── SCANLINE ── */
    .scanline {
      position: fixed; top: -100%; left: 0; right: 0; height: 2px; z-index: 10;
      background: linear-gradient(90deg, transparent, rgba(26,111,255,0.6), transparent);
      animation: scan 5s linear infinite;
    }
    @keyframes scan { to { top: 110%; } }

    /* ── CORNER MARKS ── */
    .corner { position: fixed; width: 22px; height: 22px; z-index: 8; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--blue-core); }
    .corner::before { width: 2px; height: 100%; }
    .corner::after  { width: 100%; height: 2px; }
    .corner.tl { top: 24px; left: 24px; }
    .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .corner.bl { bottom: 54px; left: 24px; transform: scaleY(-1); }
    .corner.br { bottom: 54px; right: 24px; transform: scale(-1); }

    /* ── PARTICLES ── */
    .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .p {
      position: absolute; width: 2px; height: 2px;
      background: var(--blue-core); border-radius: 50%;
      animation: float linear infinite; opacity: 0;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) translateX(var(--dx,0px)); opacity: 0; }
    }

    /* ── MAIN WRAPPER ── */
    .wrapper {
      position: fixed;
      inset: 0;
      bottom: 44px; /* space for ticker */
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: clamp(0.5rem, 1.8vh, 1.4rem);
    }

    /* ── TAG ── */
    .tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(0.58rem, 1vw, 0.76rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--blue-glow);
      border: 1px solid rgba(26,111,255,0.35);
      padding: 6px 20px;
      border-radius: 2px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tag::before {
      content: '';
      position: absolute; left: -100%; top: 0; bottom: 0; width: 60%;
      background: linear-gradient(90deg, transparent, rgba(26,111,255,0.15), transparent);
      animation: shimmer 3s ease infinite 1.5s;
    }
    @keyframes shimmer { to { left: 160%; } }

    /* ── LOGO ── */
    .logo-wrap {
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.55s;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-ring {
      position: absolute;
      inset: -8px 0px;
      border-radius: 50%;
      border: 1px solid rgba(26,111,255,0.18);
      animation: ringPulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes ringPulse { 50% { border-color: rgba(26,111,255,0.28); transform: scale(1.04); } }

    .logo-img {
      display: block;
      /* Responsive: fluid between 240px and 540px, capped at 42% of viewport width */
      width: clamp(420px, 62vw, 780px);
      max-height: 50vh;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 28px rgba(26,111,255,0.45)) drop-shadow(0 0 60px rgba(26,111,255,0.2));
      animation: logoPulse 4s ease-in-out infinite 1.5s;
    }
    @keyframes logoPulse {
      0%,100% { filter: drop-shadow(0 0 28px rgba(26,111,255,0.45)) drop-shadow(0 0 60px rgba(26,111,255,0.2)); }
      50%      { filter: drop-shadow(0 0 46px rgba(26,111,255,0.8)) drop-shadow(0 0 100px rgba(26,111,255,0.4)); }
    }

    /* ── HEADLINE ── */
    .headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 3.5vw, 3rem);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.85s;
      flex-shrink: 0;
    }
    .headline em { font-style: normal; color: var(--blue-bright); }

    /* ── SUBLINE ── */
    .subline {
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      font-size: clamp(0.82rem, 1.4vw, 0.98rem);
      color: var(--white-dim);
      max-width: min(480px, 86vw);
      line-height: 1.75;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.05s;
      flex-shrink: 0;
    }

    /* ── EMAIL BUTTON ── */
    .email-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: clamp(0.6rem, 1.5vh, 1.2rem);
      padding: 12px 28px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(0.78rem, 1.3vw, 0.95rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      border: 1px solid rgba(26,111,255,0.45);
      border-radius: 2px;
      background: rgba(26,111,255,0.08);
      backdrop-filter: blur(6px);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.3s;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .email-btn:hover {
      background: rgba(26,111,255,0.2);
      border-color: var(--blue-core);
      box-shadow: 0 0 22px rgba(26,111,255,0.35), inset 0 0 12px rgba(26,111,255,0.08);
    }
    .email-icon { font-size: 1rem; color: var(--blue-glow); }

        /* ── BOTTOM TICKER ── */
    .bottom-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 44px; z-index: 6;
      display: flex; align-items: center;
      overflow: hidden;
      border-top: 1px solid rgba(26,111,255,0.1);
      background: rgba(5,6,8,0.85);
      backdrop-filter: blur(10px);
    }
    .ticker {
      display: flex; align-items: center;
      white-space: nowrap;
      animation: ticker 24s linear infinite;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(0.58rem, 0.9vw, 0.72rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(26,111,255,0.55);
    }
    .ticker span { margin: 0 2.5rem; }
    .ticker .dot { color: var(--blue-glow); font-size: 1rem; }
    @keyframes ticker { to { transform: translateX(-50%); } }

    /* ── FADE UP ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */

    /* Large desktop 1440px+ — bigger logo */
    @media (min-width: 1440px) {
      .logo-img { width: clamp(600px, 52vw, 900px); max-height: 52vh; }
    }

    /* Tablet 768px and below */
    @media (max-width: 768px) {
      .logo-img { width: clamp(220px, 68vw, 420px); max-height: 28vh; }
      .corner { width: 16px; height: 16px; }
    }

    /* Mobile 480px and below */
    @media (max-width: 480px) {
      .logo-img { width: 82vw; max-height: 26vh; }
      .tag { font-size: 0.56rem; letter-spacing: 0.22em; padding: 5px 12px; }
      .corner { display: none; }
    }

    /* Short screens / landscape */
    @media (max-height: 560px) {
      .logo-img { max-height: 24vh; width: clamp(180px, 40vw, 380px); }
      .wrapper { gap: 0.4rem; }
      .subline { display: none; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-center"></div>
  <div class="noise"></div>
  <div class="scanline"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="particles" id="particles"></div>

  <div class="wrapper">
    <div class="tag">&#9679; We are cooking something</div>

    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <img class="logo-img" src="hero.png" alt="Radora — Building What's Next" />
    </div>

    <div class="headline">Something <em>big</em> is on the way.</div>
    <p class="subline">We're in the kitchen, crafting something you've never seen before.<br>Stay close — the wait will be worth every second.</p>
    <a class="email-btn" href="mailto:office@radora.me"><span class="email-icon">✉</span> office@radora.me</a>
  </div>

  <div class="bottom-strip">
    <div class="ticker" id="ticker"></div>
  </div>

  <script>
    const words = ['RADORA','<span class="dot">✦</span>','COMING SOON','<span class="dot">✦</span>','WE ARE COOKING','<span class="dot">✦</span>','STAY TUNED','<span class="dot">✦</span>','SOMETHING BIG','<span class="dot">✦</span>',"BUILDING WHAT'S NEXT",'<span class="dot">✦</span>'];
    const t = document.getElementById('ticker');
    let html = '';
    for (let i = 0; i < 4; i++) words.forEach(w => html += `<span>${w}</span>`);
    t.innerHTML = html;

    const container = document.getElementById('particles');
    for (let i = 0; i < 35; i++) {
      const p = document.createElement('div'); p.className = 'p';
      const left = Math.random() * 100, dur = 8 + Math.random() * 14, delay = Math.random() * 12, dx = (Math.random() - 0.5) * 120;
      p.style.cssText = `left:${left}%;bottom:0;--dx:${dx}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
      container.appendChild(p);
    }
  </script>
</body>
</html>
